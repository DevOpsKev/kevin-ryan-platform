name: Build and Deploy AI-Immigrants

on:
  push:
    branches: ["main"]
    paths:
      - "sites/aiimmigrants-com/**"

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: deploy-aiimmigrants-com
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set short SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: sites/aiimmigrants-com/Dockerfile
          push: true
          tags: |
            ghcr.io/devopskev/aiimmigrants-com:${{ steps.vars.outputs.SHA }}
            ghcr.io/devopskev/aiimmigrants-com:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/aiimmigrants-com:${{ steps.vars.outputs.SHA }}
            ${{ secrets.ACR_LOGIN_SERVER }}/aiimmigrants-com:latest
          build-args: |
            COMMIT_SHA=${{ steps.vars.outputs.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in Kubernetes manifest
        run: |
          sed -i "s|image: .*aiimmigrants-com:.*|image: ${{ secrets.ACR_LOGIN_SERVER }}/aiimmigrants-com:${{ steps.vars.outputs.SHA }}|" \
            k8s/aiimmigrants-com/deployment.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/aiimmigrants-com/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "[deploy] aiimmigrants-com: ${{ steps.vars.outputs.SHA }}"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((i * 2))
          done
          echo "Failed to push after 5 attempts" && exit 1
