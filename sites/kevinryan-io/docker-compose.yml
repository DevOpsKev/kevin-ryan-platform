services:
  web:
    build:
      context: ../..
      dockerfile: sites/kevinryan-io/Dockerfile
      args:
        COMMIT_SHA: local
    container_name: kevinryan-io
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
