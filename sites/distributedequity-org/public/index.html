<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>distributedequity.org</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .title {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .sha {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: #333;
    }
  </style>
</head>
<body>

  <span class="title">Distributed Equity</span>

  <p class="sha">{{COMMIT_SHA}}</p>

</body>
</html>
