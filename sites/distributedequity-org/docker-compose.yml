services:
  web:
    build:
      context: ../..
      dockerfile: sites/distributedequity-org/Dockerfile
    container_name: distributedequity-org
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
