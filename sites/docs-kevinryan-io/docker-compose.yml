services:
  web:
    build:
      context: ../..
      dockerfile: sites/docs-kevinryan-io/Dockerfile
    container_name: docs-kevinryan-io
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
