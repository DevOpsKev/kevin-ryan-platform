apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-store
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
  interval: 10m0s
  path: ./k8s/external-secrets-store
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
