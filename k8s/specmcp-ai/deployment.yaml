apiVersion: apps/v1
kind: Deployment
metadata:
  name: specmcp-ai
  namespace: specmcp-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: specmcp-ai
  template:
    metadata:
      labels:
        app: specmcp-ai
    spec:
      containers:
        - name: specmcp-ai
          image: kevinryanacr.azurecr.io/specmcp-ai:16f9442
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
