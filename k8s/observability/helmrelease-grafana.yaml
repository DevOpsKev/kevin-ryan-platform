apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: ">=11.0.0 <12.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: observability
      interval: 1h
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    replicas: 1
    nodeSelector:
      role: observability
    tolerations:
      - key: observability
        operator: Equal
        value: "true"
        effect: NoSchedule
    admin:
      existingSecret: grafana-db
      passwordKey: GF_SECURITY_ADMIN_PASSWORD
    envFromSecret: grafana-db
    grafana.ini:
      server:
        root_url: "https://monitoring.kevinryan.io"
      auth:
        disable_login_form: false
      users:
        allow_sign_up: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://loki.observability.svc.cluster.local:3100
            isDefault: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: observability
        folderAnnotation: grafana_folder
    service:
      type: ClusterIP
      port: 80
